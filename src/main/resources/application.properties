spring.application.name=watchParty

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/watchparty}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvcldhdGNoUGFydHlBcHBsaWNhdGlvbjIwMjY=}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000

# Cache
spring.cache.type=redis
app.cache.default-ttl-minutes=${CACHE_DEFAULT_TTL:10}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Rate Limiting
app.rate-limit.requests-per-minute=${RATE_LIMIT:100}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Presence
app.presence.heartbeat-timeout-seconds=${HEARTBEAT_TIMEOUT:90}