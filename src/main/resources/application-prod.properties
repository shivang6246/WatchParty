spring.application.name=watchParty

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT
jwt.secret=${JWT_SECRET}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=2000

# Cache
spring.cache.type=redis
app.cache.default-ttl-minutes=${CACHE_DEFAULT_TTL:10}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Rate limiting
app.rate-limit.requests-per-minute=${RATE_LIMIT:100}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Presence
app.presence.heartbeat-timeout-seconds=${HEARTBEAT_TIMEOUT:90}

server.port=${PORT:8080}